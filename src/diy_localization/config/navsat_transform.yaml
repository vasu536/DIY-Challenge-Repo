# navsat_transform — GPS ↔ map-frame bridge
# ══════════════════════════════════════════
# Converts /gps/fix (lat/lon) into /odometry/gps (map-frame Odometry)
# for consumption by EKF2 (ekf_global.yaml).
#
# Prerequisites:
#   1. The robot must have a valid heading estimate (from EKF1 / FAST-LIO2)
#      before navsat_transform will produce output.  Delay of 3 s gives
#      FAST-LIO2 time to initialise on first LiDAR sweep.
#   2. broadcast_utm_transform:true publishes the UTM→map TF so RViz
#      can display GPS track in map space.
#
# CALIB NOTES:
#   yaw_offset: physical angle between robot +X axis and GPS antenna +North.
#   Measure during extrinsics calibration session; default 1.5708 = East-facing.
#   magnetic_declination_radians: look up for competition site from NOAA.

navsat_transform_node:
    ros__parameters:
        # How many seconds to wait for a valid heading before outputting GPS odom.
        delay: 3.0

        # Magnetic declination at competition site in radians (+ = East).
        # CALIB: replace with NOAA-computed value for competition GPS location.
        magnetic_declination_radians: 0.0

        # Angle between robot +X (forward) and magnetic North, measured CW.
        # CALIB: replace after extrinsics + heading calibration session.
        yaw_offset: 1.5707963267948966   # π/2 = robot faces East by default

        # If true, keep GPS fix covariance from the sensor message
        # rather than the yaml value below.
        use_odometry_yaw: false

        # Broadcast the UTM → map TF so that GPS track is visible in RViz.
        broadcast_utm_transform: true

        # UTM zone offset: zero_altitude keeps Z at 0 in map frame.
        zero_altitude: true

        # Only used when broadcast_utm_transform is false (not needed here).
        broadcast_utm_transform_as_parent_frame: false

        # Publish filtered GPS for diagnostics.
        publish_filtered_gps: true

        # Frequency at which to publish /odometry/gps and /gps/filtered.
        frequency: 10.0

        # Two-D mode: ignore altitude, set z=0 in output odometry.
        two_d_mode: true

        # Topic remaps are handled in localization.launch.py — no overrides needed here.
